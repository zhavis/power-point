<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ارائه‌ی اسلاید</title>
    <link rel="stylesheet" href="styles.css">
    <!-- jsPDF and html2canvas for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <!-- Persian Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Marked for markdown parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
</head>
<body>
    <div id="app">
        <div class="presentation-container">
            <!-- Slide Content - Full Page -->
            <div class="slide-viewport">
                <div class="slide-content" id="slideContent">
                    <div class="loading">در حال بارگذاری ارائه...</div>
                </div>
            </div>

            <!-- Minimal Controls - Overlay -->
            <div class="controls-overlay" id="controlsOverlay">
                <div class="top-controls">
                    <div class="slide-info">
                        <span class="slide-counter" id="slideCounter">۱ / ۱</span>
                        <span class="slide-title-bar" id="slideTitle">در حال بارگذاری...</span>
                    </div>
                    <div class="slide-controls">
                        <select id="presentationSelector" class="presentation-selector">
                            <option value="osi">OSI Presentation</option>
                        </select>
                        <button id="shareBtn" class="ctrl-btn" title="Copy shareable link (Ctrl+Shift+C)">🔗</button>
                        <button id="exportPdfBtn" class="ctrl-btn" title="Export as PDF (Ctrl+Shift+P)">📄</button>
                        <button id="fullscreenBtn" class="ctrl-btn" title="تمام صفحه (F)">⛶</button>
                    </div>
                </div>

                <div class="bottom-controls">
                    <button id="prevBtn" class="ctrl-btn nav-btn" disabled>▶</button>
                    
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <div class="slide-dots" id="slideDots"></div>
                    </div>
                    
                    <button id="nextBtn" class="ctrl-btn nav-btn">◀</button>
                </div>
            </div>

            <!-- Auto-hide indicator -->
            <div class="hint">ماوس را حرکت دهید یا ضربه بزنید</div>
        </div>
    </div>

    <!-- Loading Overlay for PDF Export -->
    <div id="pdf-loading-overlay" class="pdf-export-loading" style="display:none;">
        <div class="spinner"></div>
        <div class="progress-text">Generating PDF...</div>
        <div class="progress-bar-container">
            <div class="progress-fill-bar" id="pdf-progress-fill"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
